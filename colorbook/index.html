<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kids Coloring Book</title>

  <!-- MOBILE CRITICAL -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

</head>
<body>
  <div class="app">

<!-- TOP BAR : Tools & Actions -->
<div class="top-bar">
  <!-- Core Drawing Tools -->
  <button id="drawBtn" title="Brush" aria-label="Brush" class="active-tool">🖌️</button>
  <button id="bucketBtn" title="Paint Bucket" aria-label="Paint Bucket">🪣</button>
  <button id="eraser" title="Eraser" aria-label="Eraser">🧽</button>

  <div class="divider"></div>

  <!-- Actions -->
  <button id="undo" title="Undo Last Stroke" aria-label="Undo">↩️</button>
  <button id="clearAll" title="Clear Canvas" aria-label="Clear All">🗑️</button>
  <button id="speakBtn" title="Read Aloud" aria-label="Read Aloud">🔊</button>
  <button id="galleryBtn" title="Gallery" aria-label="Open Gallery">📚</button>
  <button id="gameBtn" title="Play Game" aria-label="Play Game">🎮</button>
</div>

<!-- GALLERY OVERLAY -->
<div id="galleryOverlay" hidden>
  <div class="gallery-header">
    <span>Choose a Sketch</span>
    <button id="closeGallery">✖️</button>
  </div>
  <div id="galleryGrid"></div>
</div>

<!-- MAIN ZONE -->
<div class="workspace">

  <!-- LEFT COLOR BAR -->
  <div id="colorBar">
    <!-- BASIC INFANT COLORS -->
<button data-color="#FF3B30" style="background:#FF3B30"></button> <!-- Red -->
<button data-color="#FF9500" style="background:#FF9500"></button> <!-- Orange -->
<button data-color="#FFCC00" style="background:#FFCC00"></button> <!-- Yellow -->

<button data-color="#34C759" style="background:#34C759"></button> <!-- Green -->
<button data-color="#A3E635" style="background:#A3E635"></button> <!-- Lime Green -->

<button data-color="#5AC8FA" style="background:#5AC8FA"></button> <!-- Sky Blue -->
<button data-color="#007AFF" style="background:#007AFF"></button> <!-- Blue -->
<button data-color="#30B0C7" style="background:#30B0C7"></button> <!-- Cyan -->

<button data-color="#AF52DE" style="background:#AF52DE"></button> <!-- Purple -->
<button data-color="#FFC0CB" style="background:#FFC0CB"></button> <!-- Pink -->

<button data-color="#8E6E53" style="background:#8E6E53"></button> <!-- Brown -->
<button data-color="#000000" style="background:#000000"></button> <!-- Black -->

  </div>

  <!-- CANVAS -->
  <canvas id="canvas"></canvas>

</div>

<!-- BOTTOM IMAGE PICKER -->
<div id="sidebar"></div>
</div>
<script src="app.js"></script>
</body>

</html>
