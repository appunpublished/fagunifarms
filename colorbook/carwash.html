<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Car Wash</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #9be7ff;
      touch-action: none;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #backBtn {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.94);
      color: #263238;
      border: 2px solid #9cc7d6;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(20, 100, 130, 0.15);
    }
    .toolbox {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.94);
      border: 2px solid #b7dce8;
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 8px 22px rgba(19, 93, 122, 0.22);
    }
    .toolbox button {
      width: 82px;
      min-height: 58px;
      border: 2px solid #9cc7d6;
      border-radius: 8px;
      background: #fff;
      color: #263238;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }
    .toolbox button.active {
      color: #fff;
      background: #007aff;
      border-color: #0062cc;
    }
    @media (max-width: 430px) {
      #backBtn { top: 10px; left: 10px; font-size: 14px; padding: 7px 12px; }
      .toolbox { width: calc(100vw - 18px); box-sizing: border-box; justify-content: center; bottom: 8px; }
      .toolbox button { width: 31%; min-height: 54px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <a id="backBtn" href="games.html">Back</a>
  <canvas id="gameCanvas"></canvas>
  <div class="toolbox" aria-label="Car wash tools">
    <button id="waterTool" class="active" type="button">Water</button>
    <button id="soapTool" type="button">Soap</button>
    <button id="scrubTool" type="button">Scrub</button>
  </div>
  <script src="carwash.js"></script>
</body>
</html>
