<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Games Hub</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f0f8ff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      touch-action: none;
      overscroll-behavior: none;
    }
    h1 {
      color: #333;
      margin-bottom: 40px;
      font-size: 32px;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 80%;
      max-width: 300px;
    }
    .game-btn {
      padding: 24px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .game-btn:active {
      transform: scale(0.95);
    }
    .game-btn.car {
      background: #FF9500;
      box-shadow: 0 8px 16px rgba(255, 149, 0, 0.3);
    }
    .game-btn.snake {
      background: #34C759;
      box-shadow: 0 8px 16px rgba(52, 199, 89, 0.3);
    }
    .game-btn.starwars {
      background: #5856D6;
      box-shadow: 0 8px 16px rgba(88, 86, 214, 0.3);
    }
    #backBtn {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 16px;
      background: #fff;
      color: #333;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      z-index: 10;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <a id="backBtn" href="index.html">🔙 Home</a>
  <h1>Choose a Game!</h1>
  <div class="container">
    <a href="game.html" class="game-btn car">🏎️ Car Game</a>
    <a href="snake.html" class="game-btn snake">🐍 Snake Game</a>
    <a href="starwars.html" class="game-btn starwars">🚀 Space Escape</a>
  </div>
</body>
</html>
