<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Games Hub</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f0f8ff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 80px 0 40px 0;
      box-sizing: border-box;
    }
    h1 {
      color: #333;
      margin-bottom: 40px;
      font-size: 32px;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 80%;
      max-width: 300px;
    }
    .game-btn {
      padding: 24px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .game-btn:active {
      transform: scale(0.95);
    }
    .game-btn.car {
      background: #FF9500;
      box-shadow: 0 8px 16px rgba(255, 149, 0, 0.3);
    }
    .game-btn.snake {
      background: #34C759;
      box-shadow: 0 8px 16px rgba(52, 199, 89, 0.3);
    }
    .game-btn.starwars {
      background: #5856D6;
      box-shadow: 0 8px 16px rgba(88, 86, 214, 0.3);
    }
    .game-btn.bubblepop {
      background: #5AC8FA;
      box-shadow: 0 8px 16px rgba(90, 200, 250, 0.3);
    }
    .game-btn.memorymatch {
      background: #FF2D55;
      box-shadow: 0 8px 16px rgba(255, 45, 85, 0.3);
    }
    .game-btn.connectdots {
      background: #AF52DE;
      box-shadow: 0 8px 16px rgba(175, 82, 222, 0.3);
    }
    .game-btn.reaction {
      background: #007AFF;
      box-shadow: 0 8px 16px rgba(0, 122, 255, 0.3);
    }
    .game-btn.shapesorter {
      background: #E91E63;
      box-shadow: 0 8px 16px rgba(233, 30, 99, 0.3);
    }
    .game-btn.letterdrop {
      background: #30B0C7;
      box-shadow: 0 8px 16px rgba(48, 176, 199, 0.3);
    }
  .game-btn.vocabmatch {
    background: #FF9500;
    box-shadow: 0 8px 16px rgba(255, 149, 0, 0.3);
  }
  .game-btn.wordpuzzle {
    background: #8E6E53;
    box-shadow: 0 8px 16px rgba(142, 110, 83, 0.3);
  }
  .game-btn.alphabet {
    background: #E040FB;
    box-shadow: 0 8px 16px rgba(224, 64, 251, 0.3);
  }
  .game-btn.numbers {
    background: #00BCD4;
    box-shadow: 0 8px 16px rgba(0, 188, 212, 0.3);
  }
    #backBtn {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 16px;
      background: #fff;
      color: #333;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      z-index: 10;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <a id="backBtn" href="index.html">🔙 Home</a>
  
  <div style="position: fixed; top: 16px; right: 16px; z-index: 10;">
    <select id="globalLangSelect" style="padding: 8px 12px; border-radius: 8px; font-size: 16px; border: 2px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: white; cursor: pointer;">
      <option value="en">🇬🇧 English</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
  </div>
  <script>
    const ls = document.getElementById('globalLangSelect');
    ls.value = localStorage.getItem('appLang') || 'en';
    ls.addEventListener('change', e => localStorage.setItem('appLang', e.target.value));
  </script>

  <h1>Choose a Game!</h1>
  <div class="container">
    <a href="alphabet.html" class="game-btn alphabet">🔤 ABC Explorer</a>
    <a href="numbers.html" class="game-btn numbers">🔢 123 Explorer</a>
    <a href="game.html" class="game-btn car">🏎️ Car Game</a>
    <a href="snake.html" class="game-btn snake">🐍 Snake Game</a>
    <a href="starwars.html" class="game-btn starwars">🚀 Space Escape</a>
    <a href="bubblepop.html" class="game-btn bubblepop">🫧 Bubble Pop</a>
    <a href="memorymatch.html" class="game-btn memorymatch">🃏 Memory Match</a>
    <a href="connectdots.html" class="game-btn connectdots">✍️ Connect the Dots</a>
    <a href="shapesorter.html" class="game-btn shapesorter">🔵 Shape Sorter</a>
    <a href="letterdrop.html" class="game-btn letterdrop">🧺 Letter Drop</a>
    <a href="reaction.html" class="game-btn reaction">⚡ 2-Player Reaction</a>
    <a href="vocabmatch.html" class="game-btn vocabmatch">🗣️ Vocab Safari</a>
    <a href="wordpuzzle.html" class="game-btn wordpuzzle">🧩 Word Puzzle</a>
  </div>
</body>
</html>
